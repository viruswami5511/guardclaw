# .github/workflows/guardclaw-verify.yml
#
# GuardClaw GEF Ledger Verification
# ==================================
# Automatically verifies all .gef and .jsonl ledger files in guardclaw-artifacts/
# on every push and pull request.
#
# Verification is content-based, not extension-based — both .gef and .jsonl
# are accepted. .gef is the recommended extension for GEF artifacts.
#
# Exits 0 (pass) if all ledgers are valid.
# Exits 1 (fail) if any ledger has chain breaks, invalid signatures, or schema violations.
#
# To add to your own repo, copy this file as-is.

name: GuardClaw Verify

on:
  push:
    paths:
      - "guardclaw-artifacts/**"
  pull_request:
    paths:
      - "guardclaw-artifacts/**"
  workflow_dispatch:

jobs:
  verify:
    name: Verify GEF ledger artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GuardClaw
        run: pip install guardclaw

      - name: Verify all GEF artifacts (.gef and .jsonl)
        run: |
          ARTIFACTS=$(find guardclaw-artifacts -name "*.gef" -o -name "*.jsonl")

          if [ -z "$ARTIFACTS" ]; then
            echo "[guardclaw] No .gef or .jsonl artifacts found — skipping verification."
            exit 0
          fi

          echo "Found artifacts:"
          echo "$ARTIFACTS"
          echo ""

          FAILED=0
          while IFS= read -r f; do
            echo "Verifying: $f"
            python -m guardclaw verify "$f" --format compact || FAILED=1
          done < <(find guardclaw-artifacts -name "*.gef" -o -name "*.jsonl")

          [ $FAILED -eq 0 ] || exit 1